<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SupermarketAR — Scan</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #0a0e1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-family: 'Press Start 2P', monospace;
            color: #00ff88;
            font-size: clamp(12px, 4vw, 18px);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-bottom: 24px;
        }
        #reader {
            width: 90%;
            max-width: 380px;
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #status {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            margin-top: 20px;
        }
        .btn-manual {
            margin-top: 24px;
            padding: 12px 28px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-manual:hover {
            border-color: #00ff88;
            color: #00ff88;
        }
    </style>
</head>
<body>

<h1>🏪 SupermarketAR</h1>
<p>Scan a shelf QR code to see offers in AR</p>

<div id="reader"></div>
<p id="status">Camera starting...</p>

<a class="btn-manual"
   href="/ar-view/">
    Skip — open AR directly
</a>

<script>
    const html5QrCode = new Html5Qrcode("reader")
    let scanned = false

    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (decodedText) => {
            if (scanned) return
            scanned = true
            document.getElementById('status').textContent = '✅ QR detected — loading offers...'
            html5QrCode.stop().then(() => {
                window.location.href = `/ar-view/?marker=${decodedText}`
            }).catch(() => {
                window.location.href = `/ar-view/?marker=${decodedText}`
            })
        }
    ).catch((err) => {
        console.error('Camera error:', err)
        document.getElementById('status').textContent = 'Camera access required.'
    })
</script>

</body>
</html>
