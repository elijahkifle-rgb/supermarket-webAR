<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SupermarketAR</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #0a0e1a;
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
        }
        a-scene {
            position: fixed !important;
            inset: 0 !important;
            z-index: 0 !important;
        }

        /* ── Top bar ── */
        #top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.80);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        #top-bar h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #00ff88;
        }
        #top-bar .sub {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }

        /* ── Category filter bar ── */
        #filter-bar {
            position: fixed;
            top: 52px; left: 0; right: 0;
            background: rgba(0,0,0,0.75);
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            -webkit-overflow-scrolling: touch;
        }
        #filter-bar::-webkit-scrollbar { display: none; }
        .cat-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .cat-btn.active {
            background: #00ff88;
            color: #0a0e1a;
            border-color: #00ff88;
            font-weight: 700;
        }

        /* ── Scan hint ── */
        #scan-hint {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            pointer-events: none;
            padding: 0 24px;
        }
        #scan-hint p {
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-shadow: 0 0 12px rgba(0,0,0,0.9);
            margin-bottom: 6px;
        }
        #scan-hint .sub {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        /* ── Offer popup ── */
        #offer-popup {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(10,14,26,0.97);
            border-top: 2px solid #00ff88;
            border-radius: 20px 20px 0 0;
            padding: 20px 20px 32px;
            z-index: 200;
            display: none;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        #offer-popup.show {
            display: block;
            transform: translateY(0);
        }
        #offer-popup .handle {
            width: 36px; height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        #offer-product {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            color: #00ff88;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        .offer-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        #offer-price-now {
            font-size: 32px;
            font-weight: 700;
            color: #00ff88;
        }
        #offer-price-was {
            font-size: 16px;
            color: rgba(255,255,255,0.4);
            text-decoration: line-through;
        }
        #offer-discount {
            background: #ff6b6b;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        #offer-category {
            display: inline-block;
            background: rgba(67,97,238,0.2);
            color: #7b9ff9;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        #offer-valid {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
        }
        #offer-marker {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            color: rgba(255,255,255,0.3);
            margin-top: 4px;
        }
        #close-popup {
            position: absolute;
            top: 16px; right: 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            color: white;
            width: 32px; height: 32px;
            font-size: 16px;
            cursor: pointer;
            display: grid;
            place-items: center;
        }

        /* ── Loading ── */
        #loading {
            position: fixed; inset: 0;
            background: #0a0e1a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: white; z-index: 999; gap: 20px;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.10);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        #loading p {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: rgba(255,255,255,0.6);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Hide A-Frame VR button ── */
        .a-enter-vr { display: none !important; }
        .a-enter-ar { display: none !important; }
    </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
    <div class="spinner"></div>
    <p>LOADING...</p>
</div>

<!-- A-Frame AR scene -->
<a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; matrixCodeType: 3x3;"
        renderer="logarithmicDepthBuffer: true;"
        vr-mode-ui="enabled: false">

    <a-light type="ambient" color="#ffffff" intensity="2.0"/>

    <a-marker
            id="main-marker"
            type="pattern"
            url="/markers/badge_of_kineton.patt"
            smooth="true"
            smooth-count="8"
            smooth-tolerance="0.2"
            smooth-threshold="3"
            patternRatio="0.5">

        <!-- Offer label plane -->
        <a-plane
                id="offer-plane"
                position="0 0.5 0"
                rotation="-90 0 0"
                width="1.8" height="1.0"
                color="#0a0e1a"
                opacity="0.92"
                side="double">
        </a-plane>

        <!-- Product name -->
        <a-text
                id="ar-product"
                value="SCANNING..."
                position="0 0.5 0.01"
                rotation="-90 0 0"
                color="#00ff88"
                scale="0.18 0.18 0.18"
                align="center"
                wrap-count="20">
        </a-text>

        <!-- Price -->
        <a-text
                id="ar-price"
                value="€0.00"
                position="0 0.5 -0.18"
                rotation="-90 0 0"
                color="#ffffff"
                scale="0.28 0.28 0.28"
                align="center">
        </a-text>

        <!-- Discount badge -->
        <a-text
                id="ar-discount"
                value=""
                position="0.5 0.5 -0.35"
                rotation="-90 0 0"
                color="#ff6b6b"
                scale="0.18 0.18 0.18"
                align="center">
        </a-text>

        <!-- Category -->
        <a-text
                id="ar-category"
                value=""
                position="0 0.5 -0.42"
                rotation="-90 0 0"
                color="#7b9ff9"
                scale="0.14 0.14 0.14"
                align="center">
        </a-text>

    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

<!-- UI overlay -->
<div id="top-bar">
    <div>
        <h1>🏪 SupermarketAR</h1>
        <div class="sub">Point at a shelf marker</div>
    </div>
</div>

<!-- Category filter -->
<div id="filter-bar">
    <button class="cat-btn active" onclick="setFilter('all')">🏷 All</button>
    <button class="cat-btn" onclick="setFilter('food')">🍝 Food</button>
    <button class="cat-btn" onclick="setFilter('drinks')">🥤 Drinks</button>
    <button class="cat-btn" onclick="setFilter('home')">🏠 Home</button>
    <button class="cat-btn" onclick="setFilter('hardware')">🔧 Hardware</button>
    <button class="cat-btn" onclick="setFilter('fresh')">🥦 Fresh</button>
</div>

<!-- Scan hint -->
<div id="scan-hint">
    <p>Point at a shelf marker</p>
    <div class="sub">Offers will appear in AR</div>
</div>

<!-- Offer popup -->
<div id="offer-popup">
    <div class="handle"></div>
    <button id="close-popup" onclick="closePopup()">✕</button>
    <div id="offer-category"></div>
    <div id="offer-product">—</div>
    <div class="offer-row">
        <div id="offer-price-now">€0.00</div>
        <div id="offer-price-was"></div>
        <div id="offer-discount"></div>
    </div>
    <div id="offer-valid"></div>
    <div id="offer-marker"></div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
