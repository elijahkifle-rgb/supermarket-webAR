<!DOCTYPE html>
<html>
<head>
  <title>SupermarketAR — Performance</title>
  <style>
    body { background: #0a0e1a; color: white;
      font-family: monospace; padding: 24px; }
    .metric { margin-bottom: 16px; }
    .value { font-size: 32px; color: #00ff88; font-weight: bold; }
    .label { font-size: 12px; color: rgba(255,255,255,0.4); }
    .bad { color: #ff6b6b; }
  </style>
</head>
<body>
<h1 style="color:#00ff88;margin-bottom:24px;">
  SupermarketAR — Live Performance
</h1>

<div class="metric">
  <div class="value" id="total-latency">—</div>
  <div class="label">Total Latency (ms)</div>
</div>

<div class="metric">
  <div class="value" id="kv-latency">—</div>
  <div class="label">KV Edge Latency (ms)</div>
</div>

<div class="metric">
  <div class="value" id="network-type">—</div>
  <div class="label">Network Type</div>
</div>

<div class="metric">
  <div class="value" id="config">—</div>
  <div class="label">Configuration</div>
</div>

<button onclick="measure()"
        style="padding:12px 24px;
                   background:#00ff88;
                   color:#0a0e1a;
                   border:none;
                   border-radius:10px;
                   font-weight:bold;
                   cursor:pointer;
                   margin-top:16px;">
  Measure Now
</button>

<script>
  const W = 'https://supermarket-ar-worker.webar-football.workers.dev'

  async function measure() {
    const start = Date.now()
    const r = await fetch(`${W}/api/offers/M001`)
    const total = Date.now() - start

    document.getElementById('total-latency').textContent =
            total + 'ms'
    document.getElementById('kv-latency').textContent =
            r.headers.get('X-KV-Latency') + 'ms'
    document.getElementById('config').textContent =
            r.headers.get('X-Config')

    const conn = navigator.connection
    document.getElementById('network-type').textContent =
            conn ? conn.effectiveType.toUpperCase() : 'UNKNOWN'

    // Color code
    const el = document.getElementById('total-latency')
    el.className = total < 150 ? 'value' : 'value bad'
  }

  // Auto measure on load
  measure()
  setInterval(measure, 5000)
</script>
</body>
</html>
